name: Fraud project CI

on:
    push:
        # aqui configura cuando se haga push en la rama main ejecuta esto
        branches: ["main", "develop"]
    pull_request:
        branches: ["main"]
    
jobs:
    backend-validation:
        runs-on: ubuntu-latest

        steps:
        - name: Descargar codigo del repositorio
          uses: actions/checkout@v4

        - name: Configurar python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Instalar dependencias del proyecto
          run: |
            python -m pip install --upgrade pip
            pip install flake8 pytest redis fakeredis sqlalchemy celery fastapi httpx
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi


        - name: Ejecutar una prueba de sintaxis de python
          run: |
            #detiene el flujo si hay errores de sintaxis o nombres no creados
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            # advertencias de estilo aunque no detienen el flujo solo avisan
            flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics


        - name: Ejecutar pruebas de pytest
          env:
            PYTHONPATH: .
          run: |
            python -m pytest